version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - funlen
    - gocritic
    - goheader
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    dupl:
      threshold: 100
    funlen:
      lines: 200
      statements: 200
    goheader:
      template: |-
        Copyright 2019-2026 Facebook Inc.
        SPDX-License-Identifier: Apache-2.0
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.ReadCloser).Close
        - (io.WriteCloser).Close
        - io.Copy
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - gosec
          - gocritic
      - linters:
          - unused
        source: ent.Schema
      - path: dialect/sql/schema
        linters:
          - dupl
          - gosec
      - text: "Expect WriteFile permissions to be 0600 or less"
        linters:
          - gosec
      - text: "Expect directory permissions to be 0750 or less"
        linters:
          - gosec
      - text: "Path traversal via taint analysis"
        linters:
          - gosec
      - text: "slice index out of range"
        path: entc/gen/func.go
        linters:
          - gosec
      - path: privacy/privacy.go
        linters:
          - staticcheck
      - path: entc/load/schema.go
        linters:
          - staticcheck
      - path: entc/gen/graph.go
        linters:
          - gocritic
      - path: \.go
        linters:
          - staticcheck
        text: SA1019
      - path: dialect/sql/builder.go
        linters:
          - govet
        text: stdmethods
      - path: cmd/internal/printer
        linters:
          - errcheck
          - gosec
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
